services:
  mysql:
    image: mysql:8.4
    container_name: course-enrollment-mysql
    environment:
      MYSQL_DATABASE: course_enrollment
      MYSQL_ROOT_PASSWORD: password
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
